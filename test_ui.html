<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTE Virtual Try-On Tester</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--surface);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }

        .inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            color: #cbd5e1;
        }

        input {
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .image-preview {
            width: 100%;
            height: 300px;
            background: #0f172a;
            border-radius: 0.5rem;
            border: 2px dashed #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-top: 1rem;
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .image-preview span {
            color: #64748b;
        }

        .btn-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .btn-try {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .btn-try:hover {
            background: var(--primary-hover);
        }

        .btn-sample {
            background: #334155;
            color: white;
        }

        .btn-sample:hover {
            background: #475569;
        }

        button:active {
            transform: scale(0.98);
        }

        .result-container {
            text-align: center;
            display: none;
            flex-direction: column;
            align-items: center;
            padding-top: 2rem;
            border-top: 1px solid #334155;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-image {
            max-width: 100%;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .loader {
            display: none;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ef4444;
            margin-top: 1rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Virtual Try-On Tester</h1>
        
        <p style="text-align: center; color: #94a3b8; margin-bottom: 2rem;">
            Ensure the FastAPI backend is running on http://localhost:8000
        </p>

        <!-- File upload mode active -->

        <div class="inputs">
            <div class="input-group">
                <label>Person Photo</label>
                <input type="file" id="personFile" accept="image/*" onchange="updateFilePreview('personFile', 'personPreview', 'personPlaceholder')">
                <div class="image-preview" id="personPreviewBox">
                    <span id="personPlaceholder">Person Preview</span>
                    <img id="personPreview" alt="Person">
                </div>
            </div>

            <div class="input-group">
                <label>Garment Photo</label>
                <input type="file" id="garmentFile" accept="image/*" onchange="updateFilePreview('garmentFile', 'garmentPreview', 'garmentPlaceholder')">
                <div class="image-preview" id="garmentPreviewBox">
                    <span id="garmentPlaceholder">Garment Preview</span>
                    <img id="garmentPreview" alt="Garment">
                </div>
            </div>
        </div>

        <div class="btn-container">
            <button class="btn-try" onclick="generateTryOn()" id="tryBtn">✨ Generate Try-On ✨</button>
        </div>

        <div class="loader" id="loader"></div>
        <div class="error-msg" id="errorMsg"></div>

        <div class="result-container" id="resultContainer">
            <h2 style="color: #10b981; margin-bottom: 1.5rem;">Result! 🎉</h2>
            <img class="result-image" id="resultImage" alt="Final Result">
            <p style="margin-top: 1rem; color: #94a3b8; font-size: 0.9rem;">
                Note: Generating Try-Ons takes credits. The backend caching is enabled to save credits for identical requests!
            </p>
        </div>
    </div>

    <script>
        function updateFilePreview(inputId, imgId, placeholderId) {
            const fileInput = document.getElementById(inputId);
            const img = document.getElementById(imgId);
            const placeholder = document.getElementById(placeholderId);
            
            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    img.src = e.target.result;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                img.src = '';
                img.style.display = 'none';
                placeholder.style.display = 'block';
            }
        }

        async function generateTryOn() {
            const personFile = document.getElementById('personFile').files[0];
            const garmentFile = document.getElementById('garmentFile').files[0];
            
            const errorMsg = document.getElementById('errorMsg');
            const resultContainer = document.getElementById('resultContainer');
            const loader = document.getElementById('loader');
            const tryBtn = document.getElementById('tryBtn');

            if (!personFile || !garmentFile) {
                errorMsg.innerText = "Please select both a person photo and a garment photo!";
                errorMsg.style.display = 'block';
                return;
            }

            // UI Reset
            errorMsg.style.display = 'none';
            resultContainer.style.display = 'none';
            loader.style.display = 'block';
            tryBtn.disabled = true;
            tryBtn.style.opacity = '0.7';

            try {
                const formData = new FormData();
                formData.append("person_image", personFile);
                formData.append("garment_image", garmentFile);

                const response = await fetch("http://localhost:8000/api/try-on-upload", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Server error occurred");
                }

                if (data.status === "success" && data.result_image_url) {
                    document.getElementById('resultImage').src = data.result_image_url;
                    resultContainer.style.display = 'flex';
                } else {
                    throw new Error("Failed to generate image.");
                }

            } catch (err) {
                errorMsg.innerText = "❌ Error: " + err.message + " (Make sure backend is running on localhost:8000)";
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                tryBtn.disabled = false;
                tryBtn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
